#######################################################################################
# Jupyter Book configuration for EPA141A — Model-Based Decision Making
# TU Delft | MSc Engineering and Policy Analysis
#######################################################################################

title: EPA141A — Model-Based Decision Making
author: Jazmin Zatarain Salazar · TU Delft
logo: logo.png   # place a course/TU Delft logo here; remove this line if not used

# Short description shown in the browser tab and social cards
description: >-
  Course materials for EPA141A Model-Based Decision Making at
  Delft University of Technology, MSc Engineering and Policy Analysis.
  Instructor: Jazmin Zatarain Salazar.

# Main URL where the book will be hosted (update when GitHub Pages is configured)
# url: https://<org>.github.io/epa141a

#######################################################################################
# Execution settings — notebooks are pre-executed; set to 'off' to skip re-execution
execute:
  execute_notebooks: "off"   # change to 'auto' or 'force' if you want live execution
  timeout: 600

#######################################################################################
# Parse / MyST settings
parse:
  myst_enable_extensions:
    - colon_fence
    - deflist
    - dollarmath
    - linkify
    - substitution
    - tasklist
  myst_url_schemes: [mailto, http, https]

#######################################################################################
# HTML output
html:
  use_repository_button: true
  use_issues_button: true
  use_edit_page_button: false
  home_page_in_navbar: false
  favicon: ""           # path to favicon.ico / .png if available
  extra_navbar: ""      # additional HTML in the top bar (e.g. TU Delft link)
  comments:
    hypothesis: false

#######################################################################################
# Launch buttons (uncomment and set repo info to enable Binder / JupyterHub)
# launch_buttons:
#   binderhub_url: https://mybinder.org
#   jupyterhub_url: ""

#######################################################################################
# Repository info (used by the edit / issues buttons)
repository:
  url: https://github.com/Hippo-Delft-AI-Lab/epa141a
  branch: main
  path_to_book: docs

#######################################################################################
# Bibtex / references (optional)
# bibtex_bibfiles:
#   - references.bib

#######################################################################################
# Sphinx configuration
sphinx:
  extra_extensions:
    - sphinx_design
  config:
    html_css_files:
      - custom.css
    html_theme_options:
      repository_url: https://github.com/Hippo-Delft-AI-Lab/epa141a
      use_repository_button: true
      use_issues_button: true
      show_navbar_depth: 2
      show_toc_level: 3
      navigation_with_keys: true
      logo:
        text: EPA141A
