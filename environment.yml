name: epa141a
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.12
  - pip
  # Notebook environment
  - jupyterlab>=4.0
  - ipywidgets>=8.0
  - ipykernel>=6.0
  - nodejs  # required for JupyterLab extensions
  # Core scientific stack (conda-forge builds are faster/more reliable)
  - numpy>=1.26
  - pandas>=2.0,<3.0
  - matplotlib>=3.7
  - seaborn>=0.13
  - scipy>=1.10.0
  - geopandas>=0.14     # Assignment 7: world maps
  - tqdm>=4.0
  - h5py>=3.10.0
  # pip-only packages (no conda-forge build or version constraint)
  - pip:
      - fair==2.1.3
      - platypus-opt>=1.1.0
      - ema-workbench>=3.0,<4.0
      - deap>=1.4.0
      - ipyparallel>=8.6.1
      - plotly>=5.19.0
      - pycountry>=24.6.1
      - SALib>=1.4
      - kaleido>=0.2        # plotly static image export (Assignment 7)
      - jupyter-book>=1.0   # only needed to build the course website
      # altair — DO NOT install: ≥6.0 raises TypeError on Python 3.14, breaking
      # ema_workbench.analysis. If accidentally installed: pip uninstall altair
